# .github/workflows/mdlint-check.yml
name: Markdown Lint

on:
  push:
    paths:
      - '**.md'
      - '.markdownlint.json'
      - '.markdownlint.yaml'
      - 'pyproject.toml'
  pull_request:
    paths:
      - '**.md'
      - '.markdownlint.json'
      - '.markdownlint.yaml'

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install py-mdlint (editable)
        run: pip install -e .[dev]
      
      - name: Run linter on project docs
        run: py-mdlint --batch --report github README.md ARCHITECTURE.md
        env:
          NO_COLOR: 1
      
      - name: Run tests
        run: pytest -v --cov=py_mdlint --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
